# OpenOCD config for ESP32-DevKitC with Zephyr SDK OpenOCD
# Usage: openocd -f this_file.cfg

set ESP_RTOS Zephyr
set ESP_ONLYCPU 1
set ESP32_FLASH_VOLTAGE 3.3

# JTAG interface (FTDI-based ESP-Prog or DevKitJ)
source [find interface/ftdi/esp32_devkitj_v1.cfg]

# ESP32 target
source [find target/esp32.cfg]

# JTAG speed in kHz
adapter speed 20000

# Initialize
init
reset init
